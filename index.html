<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Gastos</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <h1>Controle de Gastos</h1>

  <div class="form">
    <input type="text" id="descricao" placeholder="Descrição (ex: Almoço)" />
    <input type="number" id="valor" placeholder="Valor (ex: R$25,50)" />
    <select id="categoria">
      <option value="">Categoria</option>
      <option value="alimentacao">Alimentação</option>
      <option value="transporte">Transporte</option>
      <option value="moradia">Moradia</option>
      <option value="saude">Saúde</option>
      <option value="lazer">Lazer</option>
      <option value="outros">Outros</option>
    </select>
    <button id="btn-adicionar" onclick="adicionarGasto()">Adicionar</button>
  </div>

  <div class="total">
    <p>Total gasto no mês: <strong id="total">R$ 0,00</strong></p>
  </div>
  
  <table id="tabela">
    <thead>
      <tr>
        <th>Descrição</th>
        <th>Categoria</th>
        <th>Valor</th>
        <th>Ação</th>
      </tr>
    </thead>
    <tbody id="lista-gastos">
    </tbody>
  </table>

    <script src="script.js"></script>
</body>
</html>
