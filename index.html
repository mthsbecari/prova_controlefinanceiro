<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Gastos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Controle de Gastos</h1>

  <div class="form">
    <input type="text" id="descricao" placeholder="Descrição (ex: Almoço)" />
    <input type="number" id="valor" placeholder="Valor (ex: R$25,50)" />
    <select id="categoria">
      <option value="">Categoria</option>
      <option value="Alimentação">Alimentação</option>
      <option value="Transporte">Transporte</option>
      <option value="Moradia">Moradia</option>
      <option value="Saúde">Saúde</option>
      <option value="Lazer">Lazer</option>
      <option value="Outros">Outros</option>
    </select>
    <button id="btn-adicionar" onclick="adicionarGasto()">Adicionar</button>
  </div>

  <div class="total">
    <p>Total gasto no mês: <strong id="total">R$ 0,00</strong></p>
  </div>
